name: deeppd
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12.11
  - pip=25.2
  - numpy=2.2.6
  - pandas=2.3.2
  - scipy=1.16.1
  - scikit-learn=1.7.2
  - joblib=1.5.2

  # Chemistry + drawing (needed for interpret.py SVG)
  - rdkit=2025.03.6

  - matplotlib=3.10.5
  - seaborn=0.13.2

  - pyyaml=6.0.2
  - python-dotenv=1.0.1
  - requests=2.32.5
  - tqdm=4.67.1
  - psutil=7.0.0

  - pip:
      # PyTorch CUDA 12.1 wheels (Windows)
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.5.1+cu121
      - torchvision==0.20.1+cu121
      - torchaudio==2.5.1+cu121

      # Lightning stack
      - lightning==2.5.5
      - pytorch-lightning==2.5.5
      - torchmetrics==1.8.2

      # PyTorch Geometric + compiled ops for torch 2.5.1 cu121
      - -f https://data.pyg.org/whl/torch-2.5.1+cu121.html
      - torch-geometric==2.6.1
      - pyg-lib==0.4.0+pt25cu121
      - torch-scatter==2.1.2+pt25cu121
      - torch-sparse==0.6.18+pt25cu121
      - torch-cluster==1.6.3+pt25cu121
