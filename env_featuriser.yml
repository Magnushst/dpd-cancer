name: featuriser
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Core numerics / data
  - numpy=1.26.4
  - pandas=2.3.0
  - scikit-learn=1.6.1
  - joblib=1.5.0

  # Chemistry / featurisation
  - rdkit=2024.03.5
  - matplotlib-base=3.10.1
  - seaborn=0.13.2
  - umap-learn=0.5.7
  - python-igraph=0.11.8

  # Useful runtime packages
  - pyyaml=6.0.2
  - python-dotenv=1.1.0
  - requests=2.32.3
  - tqdm=4.67.1

  - pip:
      - deepchem==2.8.0
      - molfeat==0.10.1
      # - descriptastorus==2.6.1
      - mordredcommunity==2.0.6
      - datamol==0.12.5
      - pmapper==1.1.3
      - mapchiral==0.0.7
      - selfies==2.2.0
      - umap-learn==0.5.7
      - pytorch-lightning==2.5.1.post0
      - lightning==2.5.1
      - torchmetrics==1.7.3
